<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>📡 Estado de Equipos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f6fa;
      color: #2f3640;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 40px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    th, td {
      border: 1px solid #dcdde1;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #273c75;
      color: #fff;
    }
    tr:nth-child(even) {
      background: #f1f2f6;
    }
  </style>
</head>
<body>
  <h1>📡 Estado de Equipos</h1>
  <table>
    <thead>
      <tr>
        <th>Equipo</th>
        <th>Usuario</th>
        <th>Estado</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="tabla-status"></tbody>
  </table>

  <h1>📝 Logs Recientes</h1>
  <table>
    <thead>
      <tr>
        <th>Equipo</th>
        <th>Usuario</th>
        <th>Mensaje</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="tabla-logs"></tbody>
  </table>

  <script>
    // 🔹 Cargar estados
    async function cargarStatus() {
      const respuesta = await fetch("https://gts-server.onrender.com/status");
      const datos = await respuesta.json();
      const tabla = document.getElementById("tabla-status");
      tabla.innerHTML = "";

      datos.forEach(item => {
        const fecha = new Date(item.fecha);
        const fechaLocal = fecha.toLocaleString("es-MX", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });

        const fila = `
          <tr>
            <td>${item.equipo}</td>
            <td>${item.usuario}</td>
            <td>${item.estado}</td>
            <td>${fechaLocal}</td>
          </tr>
        `;
        tabla.innerHTML += fila;
      });
    }

    // 🔹 Cargar logs
    async function cargarLogs() {
      const respuesta = await fetch("https://gts-server.onrender.com/logs");
      const datos = await respuesta.json();
      const tabla = document.getElementById("tabla-logs");
      tabla.innerHTML = "";

      datos.forEach(item => {
        const fecha = new Date(item.fecha);
        const fechaLocal = fecha.toLocaleString("es-MX", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });

        const fila = `
          <tr>
            <td>${item.equipo}</td>
            <td>${item.usuario}</td>
            <td>${item.mensaje}</td>
            <td>${fechaLocal}</td>
          </tr>
        `;
        tabla.innerHTML += fila;
      });
    }

    // 🔄 Actualizar cada 5 segundos
    function refrescar() {
      cargarStatus();
      cargarLogs();
    }

    refrescar();
    setInterval(refrescar, 5000);
  </script>
</body>
</html>
